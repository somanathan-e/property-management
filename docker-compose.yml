version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_BASE_PATH: /property-management
      NEXT_PUBLIC_API_BASE: /property-management/api/v1
    ports:
      - "3000:3000"

  backend:
    build:
      context: ./backend
    environment:
      SERVER_SERVLET_CONTEXT_PATH: /property-management
      API_VERSION: /api/v1
    ports:
      - "8080:8080"

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: property_management
      MYSQL_USER: property_user
      MYSQL_PASSWORD: property_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql-data:

